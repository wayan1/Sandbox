<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a12">
  <title>Live Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a12;
      --surface: #13131f;
      --text: #e8e0d0;
      --text-muted: #606880;
      --accent: #4a90d9;
      --accent-dim: rgba(74,144,217,0.15);
      --active-border: #4a90d9;
      --note-color: #f59e0b;
      --note-bg: rgba(245,158,11,0.12);
      --bookmark-color: #4a90d9;
      --sheet-bg: #1a1a2e;
      --input-bg: #0f0f1a;
      --border: rgba(255,255,255,0.08);
      --toolbar-h: 64px;
      --topbar-h: 52px;
    }

    body.theme-light {
      --bg: #fafaf8;
      --surface: #f0f0ec;
      --text: #1a1a1a;
      --text-muted: #888;
      --accent: #2563eb;
      --accent-dim: rgba(37,99,235,0.1);
      --active-border: #2563eb;
      --note-color: #d97706;
      --note-bg: rgba(217,119,6,0.1);
      --bookmark-color: #2563eb;
      --sheet-bg: #fff;
      --input-bg: #f5f5f3;
      --border: rgba(0,0,0,0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Georgia, serif;
      overflow: hidden;
    }

    /* ── Top bar ── */
    #top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 50;
      transition: transform 0.25s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    #top-bar.hidden { transform: translateY(-100%); }

    #book-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: calc(100% - 80px);
    }

    #book-author {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .top-bar-left { display: flex; flex-direction: column; gap: 1px; }

    #btn-settings {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    #btn-settings:active { background: var(--accent-dim); }

    /* ── Progress bar ── */
    #progress-bar {
      position: fixed;
      top: var(--topbar-h);
      left: 0; right: 0;
      height: 2px;
      background: var(--border);
      z-index: 49;
    }
    #progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.4s ease;
    }

    /* ── Reader ── */
    #reader {
      position: fixed;
      top: calc(var(--topbar-h) + 2px);
      bottom: var(--toolbar-h);
      left: 0; right: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 24px 20px 32px;
      font-size: 18px;
      line-height: 1.75;
    }

    #reader p {
      margin-bottom: 1.4em;
      padding-left: 14px;
      border-left: 3px solid transparent;
      transition: border-color 0.2s ease, background 0.2s ease;
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      word-break: break-word;
    }

    #reader p.active {
      border-left-color: var(--active-border);
      background: var(--accent-dim);
    }

    #reader p.bookmarked::before {
      content: '🔖';
      font-size: 0.7rem;
      margin-right: 4px;
      opacity: 0.7;
    }

    #reader p.has-note {
      border-left-color: var(--note-color);
      background: var(--note-bg);
    }

    #reader p.active.has-note {
      border-left-color: var(--active-border);
      background: linear-gradient(90deg, var(--accent-dim), var(--note-bg));
    }

    #reader h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 2em 0 0.8em;
      padding-left: 14px;
      color: var(--accent);
      letter-spacing: 0.03em;
      pointer-events: none;
    }

    /* ── Speed control overlay ── */
    #speed-control {
      position: fixed;
      top: calc(var(--topbar-h) + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 60;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #speed-control[hidden] { display: none; }

    #wpm-display {
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
      min-width: 60px;
    }

    #wpm-slider {
      width: 120px;
      accent-color: var(--accent);
    }

    /* ── Bottom toolbar ── */
    #toolbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--toolbar-h);
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 50;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .tb-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 12px;
      min-width: 48px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      transition: color 0.15s, background 0.15s;
    }
    .tb-btn:active { background: var(--accent-dim); color: var(--accent); }
    .tb-btn.active-btn { color: var(--accent); }

    #btn-play {
      font-size: 1.5rem;
      color: var(--accent);
      background: var(--accent-dim);
      border-radius: 50%;
      width: 48px; height: 48px;
      padding: 0;
    }

    #notes-badge {
      position: absolute;
      top: 4px; right: 4px;
      background: var(--note-color);
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      border-radius: 8px;
      padding: 1px 4px;
      min-width: 16px;
      text-align: center;
    }

    /* ── Sheet overlay ── */
    #sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    #sheet-overlay[hidden] { display: none; }

    /* ── Bottom sheets ── */
    .bottom-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-height: 75vh;
      background: var(--sheet-bg);
      border-radius: 20px 20px 0 0;
      z-index: 110;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bottom-sheet[hidden] { display: none; }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 4px;
      flex-shrink: 0;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .sheet-header h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .sheet-body {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      padding: 12px 0;
    }

    .empty-msg {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 32px 24px;
      line-height: 1.6;
    }

    /* sheet list items */
    .sheet-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .sheet-item:active { background: var(--accent-dim); }

    .sheet-item-text { flex: 1; min-width: 0; }

    .sheet-item-label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .sheet-item-snippet {
      display: block;
      font-size: 0.9rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sheet-item-note {
      display: block;
      font-size: 0.85rem;
      color: var(--note-color);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sheet-item-action {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      min-width: 36px; min-height: 36px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sheet-item-action:active { background: var(--accent-dim); }
    .sheet-item-action.danger:active { background: rgba(239,68,68,0.15); color: #ef4444; }

    /* note edit sheet */
    .sheet-note-excerpt {
      margin: 0 20px 12px;
      padding: 10px 14px;
      background: var(--input-bg);
      border-radius: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.5;
      border-left: 3px solid var(--note-color);
    }

    #note-textarea {
      display: block;
      width: calc(100% - 40px);
      margin: 0 20px;
      min-height: 100px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      line-height: 1.5;
      padding: 12px 14px;
      resize: none;
      outline: none;
      user-select: text;
      -webkit-user-select: text;
    }
    #note-textarea:focus { border-color: var(--accent); }

    .sheet-actions {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      flex-shrink: 0;
    }

    .sheet-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
    }
    .sheet-btn.primary { background: var(--accent); color: #fff; }
    .sheet-btn.secondary { background: var(--input-bg); color: var(--text); }
    .sheet-btn.danger { background: rgba(239,68,68,0.15); color: #ef4444; }
    .sheet-btn[hidden] { display: none; }

    /* settings sheet */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }

    .setting-label {
      font-size: 0.95rem;
      color: var(--text);
      flex: 1;
    }

    .setting-value {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
      min-width: 52px;
      text-align: right;
    }

    .setting-row input[type="range"] {
      width: 140px;
      accent-color: var(--accent);
    }

    .setting-row input[type="checkbox"] {
      width: 44px; height: 26px;
      appearance: none;
      -webkit-appearance: none;
      background: var(--border);
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .setting-row input[type="checkbox"]::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .setting-row input[type="checkbox"]:checked { background: var(--accent); }
    .setting-row input[type="checkbox"]:checked::after { transform: translateX(18px); }

    /* scrollbar */
    #reader::-webkit-scrollbar { width: 3px; }
    #reader::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header id="top-bar">
    <div class="top-bar-left">
      <span id="book-title">The Time Machine</span>
      <span id="book-author">H.G. Wells</span>
    </div>
    <button id="btn-settings" aria-label="Settings">⚙</button>
  </header>

  <!-- Progress bar -->
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <!-- Reader -->
  <main id="reader" role="main" aria-label="Book reader"></main>

  <!-- Speed control (visible while playing) -->
  <div id="speed-control" hidden aria-live="polite">
    <span id="wpm-display">200 WPM</span>
    <input type="range" id="wpm-slider" min="100" max="400" step="10" value="200" aria-label="Reading speed">
  </div>

  <!-- Bottom toolbar -->
  <nav id="toolbar" aria-label="Reader controls">
    <button id="btn-prev"     class="tb-btn" aria-label="Previous paragraph">◀</button>
    <button id="btn-next"     class="tb-btn" aria-label="Next paragraph">▶</button>
    <button id="btn-play"     class="tb-btn" aria-label="Play / Pause">▶</button>
    <button id="btn-bookmark" class="tb-btn" aria-label="Bookmark current position">🔖</button>
    <button id="btn-notes-open" class="tb-btn" aria-label="View notes">
      📝<span id="notes-badge" hidden aria-hidden="true"></span>
    </button>
  </nav>

  <!-- Sheet backdrop -->
  <div id="sheet-overlay" hidden role="presentation"></div>

  <!-- Bookmarks sheet -->
  <div id="bookmarks-sheet" class="bottom-sheet" hidden role="dialog" aria-label="Bookmarks">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3>Bookmarks</h3>
    </div>
    <div class="sheet-body">
      <div id="bookmarks-list"></div>
    </div>
  </div>

  <!-- Notes list sheet -->
  <div id="notes-list-sheet" class="bottom-sheet" hidden role="dialog" aria-label="Notes">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3>Notes</h3>
    </div>
    <div class="sheet-body">
      <div id="notes-list"></div>
    </div>
  </div>

  <!-- Note edit/add sheet -->
  <div id="note-edit-sheet" class="bottom-sheet" hidden role="dialog" aria-label="Edit note">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3 id="note-sheet-title">Add Note</h3>
    </div>
    <p id="note-excerpt" class="sheet-note-excerpt"></p>
    <textarea id="note-textarea" placeholder="Write your note here…"></textarea>
    <div class="sheet-actions">
      <button id="btn-delete-note" class="sheet-btn danger" hidden>Delete</button>
      <button id="btn-cancel-note" class="sheet-btn secondary">Cancel</button>
      <button id="btn-save-note"   class="sheet-btn primary">Save</button>
    </div>
  </div>

  <!-- Settings sheet -->
  <div id="settings-sheet" class="bottom-sheet" hidden role="dialog" aria-label="Settings">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><h3>Settings</h3></div>
    <div class="sheet-body">
      <div class="setting-row">
        <span class="setting-label">Font size</span>
        <span class="setting-value" id="fontsize-display">18px</span>
        <input type="range" id="setting-fontsize" min="14" max="26" step="1" value="18" aria-label="Font size">
      </div>
      <div class="setting-row">
        <span class="setting-label">Auto-scroll speed</span>
        <span class="setting-value" id="setting-wpm-display">200 WPM</span>
        <input type="range" id="setting-wpm" min="100" max="400" step="10" value="200" aria-label="Scroll speed">
      </div>
      <div class="setting-row">
        <span class="setting-label">Light theme</span>
        <input type="checkbox" id="setting-theme" aria-label="Toggle light theme">
      </div>
    </div>
  </div>

  <script>
  const BOOK = {
    title: 'The Time Machine',
    author: 'H.G. Wells',
    text: [
      'CHAPTER I — INTRODUCTION',
      'The Time Traveller was expounding a recondite matter to us. His grey eyes shone and twinkled, and his usually pale face was flushed and animated. The fire burned brightly, and the soft radiance of the incandescent lights caught the bubbles that flashed and passed in our glasses.',
      '"You must follow me carefully. I shall have to controvert one or two ideas that are almost universally accepted. The geometry, for instance, they taught you at school is founded on a misconception."',
      '"Is not that rather a large thing to expect us to begin upon?" said Filby, an argumentative person with red hair.',
      'I think that at that time none of us quite believed in the Time Machine. The fact is, the Time Traveller was one of those men who are too clever to be believed: you never felt that you saw all round him; you always suspected some subtle reserve, some ingenuity in ambush, behind his lucid frankness.',
      '"It is simply this. That Space, as our mathematicians have it, is spoken of as having three dimensions, which one may call Length, Breadth, and Thickness, and is always definable by reference to three planes, each at right angles to the others."',
      '"There is no difference between Time and any of the three dimensions of Space except that our consciousness moves along it."',
      '"But," said the Medical Man, staring hard at a coal in the fire, "if Time is really only a fourth dimension of Space, why is it, and why has it always been, regarded as something different?"',
      '"It is only ignorance," replied the Time Traveller.',
      'The Time Traveller smiled round at us. Then, still smiling faintly, and with his hands deep in his trousers pockets, he walked slowly out of the room, and we heard his slippers shuffling down the long passage to his laboratory.',
      'The door at the end of the laboratory was open, and I saw the silhouette of a machine against the light. It was a glittering metallic framework, scarcely larger than a small clock. There was ivory in it, and some transparent crystalline substance.',
      'One of the registering dials was cracked. He pointed to it. "Do you observe this?" he said. "This was an unfortunate accident. I shall not be making another trip—at any rate, not until I have had a good night\'s sleep."',
      '"Where did you go?" I asked.',
      'He paused, looking at us. "Into the future. Many years—many centuries—into the future. And back again." He sighed and sat down heavily in the armchair.',
      'We waited. The fire crackled. Someone coughed. And then the Time Traveller began to tell his story.'
    ]
  };

  // ── State ──
  const S = {
    paragraphs: BOOK.text,
    bookId: 'the-time-machine',
    currentIdx: 0,
    playing: false,
    wpm: 200,
    fontSize: 18,
    theme: 'dark',
    bookmarks: [],
    notes: [],
    activeSheet: null,
    editingNote: null,
    tapTarget: null,
  };

  // ── Storage helpers ──
  function load(key, def) {
    try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
  }
  function save(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  }
  function bKey() { return 'br:bookmarks:' + S.bookId; }
  function nKey() { return 'br:notes:' + S.bookId; }
  function pKey() { return 'br:progress:' + S.bookId; }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Bookmarks ──
  function toggleBookmark() {
    const idx = S.currentIdx;
    const i = S.bookmarks.findIndex(b => b.paragraphIndex === idx);
    if (i >= 0) { S.bookmarks.splice(i, 1); }
    else {
      S.bookmarks.push({ id: 'bm_'+Date.now(), paragraphIndex: idx,
        snippet: S.paragraphs[idx].slice(0, 80), createdAt: new Date().toISOString() });
      S.bookmarks.sort((a,b) => a.paragraphIndex - b.paragraphIndex);
    }
    save(bKey(), S.bookmarks);
    renderBook(); scrollToActive(false);
    const btn = document.getElementById('btn-bookmark');
    btn.classList.toggle('active-btn', S.bookmarks.some(b => b.paragraphIndex === idx));
  }

  // ── Notes ──
  function handleTap(idx) {
    if (S.activeSheet) return;
    const note = S.notes.find(n => n.paragraphIndex === idx);
    if (note) { openNoteEdit(note.id); }
    else { S.tapTarget = idx; S.editingNote = null; openSheet('note-add'); }
  }

  function openNoteEdit(id) {
    S.editingNote = S.notes.find(n => n.id === id);
    if (!S.editingNote) return;
    document.getElementById('note-textarea').value = S.editingNote.text;
    document.getElementById('note-sheet-title').textContent = 'Edit Note';
    document.getElementById('btn-delete-note').hidden = false;
    openSheet('note-edit');
  }

  function saveNote() {
    const text = document.getElementById('note-textarea').value.trim();
    if (!text) return;
    if (S.editingNote) { S.editingNote.text = text; }
    else { S.notes.push({ id: 'note_'+Date.now(), paragraphIndex: S.tapTarget, text, createdAt: new Date().toISOString() }); }
    save(nKey(), S.notes); updateNotesBadge(); closeSheet(); renderBook(); scrollToActive(false);
  }

  function deleteNote() {
    if (!S.editingNote) return;
    S.notes = S.notes.filter(n => n.id !== S.editingNote.id);
    S.editingNote = null;
    save(nKey(), S.notes); updateNotesBadge(); closeSheet(); renderBook(); scrollToActive(false);
  }

  function updateNotesBadge() {
    const badge = document.getElementById('notes-badge');
    badge.textContent = S.notes.length || '';
    badge.hidden = S.notes.length === 0;
  }

  // ── Render ──
  function renderBook() {
    const reader = document.getElementById('reader');
    reader.innerHTML = '';
    S.paragraphs.forEach((text, idx) => {
      const el = document.createElement(text.startsWith('CHAPTER') ? 'h2' : 'p');
      el.dataset.idx = idx;
      el.textContent = text;
      const note = S.notes.find(n => n.paragraphIndex === idx);
      const bm   = S.bookmarks.find(b => b.paragraphIndex === idx);
      if (note) el.classList.add('has-note');
      if (bm)   el.classList.add('bookmarked');
      if (idx === S.currentIdx) el.classList.add('active');
      if (el.tagName === 'P') el.addEventListener('click', () => handleTap(idx));
      reader.appendChild(el);
    });
    updateProgress();
  }

  function setActive(idx) {
    const reader = document.getElementById('reader');
    reader.querySelector('.active')?.classList.remove('active');
    reader.querySelector('[data-idx="'+idx+'"]')?.classList.add('active');
    S.currentIdx = idx;
    save(pKey(), { paragraphIndex: idx });
    updateProgress();
  }

  function scrollToActive(smooth) {
    const reader = document.getElementById('reader');
    const el = reader.querySelector('.active');
    if (!el) return;
    const top = el.offsetTop - reader.clientHeight * 0.3;
    reader.scrollTo({ top: Math.max(0, top), behavior: smooth ? 'smooth' : 'instant' });
  }

  function updateProgress() {
    const pct = S.paragraphs.length > 1 ? (S.currentIdx / (S.paragraphs.length - 1)) * 100 : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  // ── Sheets ──
  function openSheet(name) {
    S.activeSheet = name;
    document.getElementById('sheet-overlay').hidden = false;
    const map = { bookmarks: 'bookmarks-sheet', notes: 'notes-list-sheet',
                  'note-add': 'note-edit-sheet', 'note-edit': 'note-edit-sheet',
                  settings: 'settings-sheet' };
    document.querySelectorAll('.bottom-sheet').forEach(s => { s.hidden = true; s.classList.remove('open'); });
    if (name === 'note-add') {
      document.getElementById('note-textarea').value = '';
      document.getElementById('note-sheet-title').textContent = 'Add Note';
      document.getElementById('btn-delete-note').hidden = true;
      const snip = S.paragraphs[S.tapTarget] || '';
      document.getElementById('note-excerpt').textContent = snip.slice(0, 120) + (snip.length > 120 ? '…' : '');
    }
    if (name === 'bookmarks') renderBMList();
    if (name === 'notes') renderNotesList();
    if (name === 'settings') syncSettings();
    const sheet = document.getElementById(map[name]);
    if (sheet) { sheet.hidden = false; requestAnimationFrame(() => sheet.classList.add('open')); }
  }

  function closeSheet() {
    S.activeSheet = null;
    document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('open'));
    setTimeout(() => {
      document.getElementById('sheet-overlay').hidden = true;
      document.querySelectorAll('.bottom-sheet').forEach(s => s.hidden = true);
    }, 300);
  }

  function renderBMList() {
    const el = document.getElementById('bookmarks-list');
    if (!S.bookmarks.length) { el.innerHTML = '<p class="empty-msg">No bookmarks yet. Tap 🔖 to save your place.</p>'; return; }
    el.innerHTML = '';
    S.bookmarks.forEach(bm => {
      const div = document.createElement('div'); div.className = 'sheet-item';
      div.innerHTML = `<div class="sheet-item-text"><span class="sheet-item-label">Para ${bm.paragraphIndex+1}</span><span class="sheet-item-snippet">${esc(bm.snippet)}…</span></div><button class="sheet-item-action danger" data-id="${bm.id}">✕</button>`;
      div.querySelector('.sheet-item-text').onclick = () => { setActive(bm.paragraphIndex); scrollToActive(true); closeSheet(); };
      div.querySelector('.sheet-item-action').onclick = e => { e.stopPropagation(); S.bookmarks = S.bookmarks.filter(b => b.id !== bm.id); save(bKey(), S.bookmarks); renderBook(); renderBMList(); };
      el.appendChild(div);
    });
  }

  function renderNotesList() {
    const el = document.getElementById('notes-list');
    if (!S.notes.length) { el.innerHTML = '<p class="empty-msg">No notes yet. Tap any paragraph to add a note.</p>'; return; }
    el.innerHTML = '';
    [...S.notes].sort((a,b) => a.paragraphIndex - b.paragraphIndex).forEach(note => {
      const div = document.createElement('div'); div.className = 'sheet-item';
      const snip = (S.paragraphs[note.paragraphIndex] || '').slice(0, 50);
      div.innerHTML = `<div class="sheet-item-text"><span class="sheet-item-label">Para ${note.paragraphIndex+1}: ${esc(snip)}…</span><span class="sheet-item-note">${esc(note.text)}</span></div><button class="sheet-item-action" data-id="${note.id}">✎</button>`;
      div.querySelector('.sheet-item-text').onclick = () => { setActive(note.paragraphIndex); scrollToActive(true); closeSheet(); };
      div.querySelector('.sheet-item-action').onclick = e => { e.stopPropagation(); openNoteEdit(note.id); };
      el.appendChild(div);
    });
  }

  // ── Settings ──
  function syncSettings() {
    document.getElementById('setting-fontsize').value = S.fontSize;
    document.getElementById('fontsize-display').textContent = S.fontSize + 'px';
    document.getElementById('setting-wpm').value = S.wpm;
    document.getElementById('setting-wpm-display').textContent = S.wpm + ' WPM';
    document.getElementById('setting-theme').checked = S.theme === 'light';
  }

  function savePrefs() { save('br:prefs', { fontSize: S.fontSize, theme: S.theme, wpm: S.wpm }); }

  // ── Init ──
  function init() {
    const prefs = load('br:prefs', {});
    S.wpm = prefs.wpm ?? 200; S.fontSize = prefs.fontSize ?? 18; S.theme = prefs.theme ?? 'dark';
    S.bookmarks = load(bKey(), []); S.notes = load(nKey(), []);
    const prog = load(pKey(), {}); S.currentIdx = prog.paragraphIndex ?? 0;
    document.body.classList.toggle('theme-light', S.theme === 'light');
    document.getElementById('reader').style.fontSize = S.fontSize + 'px';
    document.getElementById('book-title').textContent = BOOK.title;
    document.getElementById('book-author').textContent = BOOK.author;
    document.getElementById('wpm-slider').value = S.wpm;
    document.getElementById('wpm-display').textContent = S.wpm + ' WPM';
    document.getElementById('btn-bookmark').classList.toggle('active-btn', S.bookmarks.some(b => b.paragraphIndex === S.currentIdx));
    renderBook(); scrollToActive(false); updateNotesBadge();
  }

  // ── Top-bar auto-hide ──
  let lastScrollY = 0;
  function onReaderScroll() {
    const reader = document.getElementById('reader');
    const y = reader.scrollTop;
    document.getElementById('top-bar').classList.toggle('hidden', y > lastScrollY && y > 60);
    lastScrollY = y;
    if (!S.playing) updateActiveParagraph();
  }

  // ── Event wiring ──
  document.addEventListener('DOMContentLoaded', () => {
    init();
    document.getElementById('reader').addEventListener('scroll', onReaderScroll, { passive: true });
    document.getElementById('btn-prev').onclick = goPrev;
    document.getElementById('btn-next').onclick = goNext;
    document.getElementById('btn-play').onclick = () => S.playing ? stopPlay() : startPlay();
    document.getElementById('btn-bookmark').onclick = toggleBookmark;
    document.getElementById('btn-notes-open').onclick = () => openSheet('notes');
    document.getElementById('btn-settings').onclick = () => openSheet('settings');
    document.getElementById('wpm-slider').oninput = e => { S.wpm = +e.target.value; document.getElementById('wpm-display').textContent = S.wpm + ' WPM'; savePrefs(); };
    document.getElementById('sheet-overlay').onclick = closeSheet;
    document.getElementById('btn-save-note').onclick = saveNote;
    document.getElementById('btn-cancel-note').onclick = closeSheet;
    document.getElementById('btn-delete-note').onclick = deleteNote;
    document.getElementById('setting-fontsize').oninput = e => { S.fontSize = +e.target.value; document.getElementById('fontsize-display').textContent = S.fontSize + 'px'; document.getElementById('reader').style.fontSize = S.fontSize + 'px'; savePrefs(); };
    document.getElementById('setting-wpm').oninput = e => { S.wpm = +e.target.value; document.getElementById('setting-wpm-display').textContent = S.wpm + ' WPM'; savePrefs(); };
    document.getElementById('setting-theme').onchange = e => { S.theme = e.target.checked ? 'light' : 'dark'; document.body.classList.toggle('theme-light', S.theme === 'light'); savePrefs(); };
    // swipe down to close sheets
    let ty = 0;
    document.querySelectorAll('.bottom-sheet').forEach(s => {
      s.addEventListener('touchstart', e => { ty = e.touches[0].clientY; }, { passive: true });
      s.addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - ty > 60) closeSheet(); }, { passive: true });
    });
  });

  // ── Teleprompter ──
  let rafId = null, lastTs = null, scrollRem = 0;

  function startPlay() {
    S.playing = true;
    document.getElementById('btn-play').textContent = '⏸';
    document.getElementById('speed-control').hidden = false;
    lastTs = null; scrollRem = 0;
    rafId = requestAnimationFrame(tick);
  }

  function stopPlay() {
    S.playing = false;
    document.getElementById('btn-play').textContent = '▶';
    document.getElementById('speed-control').hidden = true;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }

  function tick(ts) {
    if (!S.playing) return;
    if (lastTs === null) lastTs = ts;
    const dt = ts - lastTs; lastTs = ts;
    scrollRem += (S.wpm / 12000) * dt;
    const px = Math.floor(scrollRem); scrollRem -= px;
    const reader = document.getElementById('reader');
    reader.scrollTop += px;
    updateActiveParagraph();
    if (reader.scrollTop + reader.clientHeight >= reader.scrollHeight - 4) { stopPlay(); return; }
    rafId = requestAnimationFrame(tick);
  }

  // ── Navigation ──
  function goPrev() { if (S.currentIdx > 0) { setActive(S.currentIdx - 1); scrollToActive(true); } }
  function goNext() { if (S.currentIdx < S.paragraphs.length - 1) { setActive(S.currentIdx + 1); scrollToActive(true); } }

  function updateActiveParagraph() {
    const reader = document.getElementById('reader');
    const mid = reader.scrollTop + reader.clientHeight * 0.35;
    for (const p of reader.querySelectorAll('p[data-idx]')) {
      if (p.offsetTop <= mid && p.offsetTop + p.offsetHeight > mid) {
        const idx = parseInt(p.dataset.idx);
        if (idx !== S.currentIdx) setActive(idx);
        break;
      }
    }
  }
  </script>
</body>
</html>
