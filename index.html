<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Into 3D</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: auto; }
    body { background: #0a0a12; color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* Fixed full-screen map */
    #map {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
    }

    /* Loading overlay */
    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a12;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(74, 144, 217, 0.2);
      border-top-color: #4a90d9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #606880; font-size: 0.9rem; }

    /* Scroll driver — creates scrollable space */
    #scroll-driver {
      position: relative;
      height: 400vh;
      z-index: 1;
      pointer-events: none;
    }

    /* Fixed overlay container */
    #overlays {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    /* Shared panel visibility */
    .panel {
      position: absolute;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
    }
    .panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* Hero */
    #hero {
      top: 50%; left: 50%;
      transform: translate(-50%, -54px);
      text-align: center;
      width: 90%;
      max-width: 640px;
    }
    #hero.visible { transform: translate(-50%, -54px); }
    #hero h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -1px;
      text-shadow: 0 2px 40px rgba(0,0,0,0.9);
    }
    #hero h1 span { color: #4a90d9; }
    #hero p {
      margin-top: 12px;
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: #a0a8c0;
      text-shadow: 0 1px 20px rgba(0,0,0,0.8);
    }
    #scroll-hint {
      position: absolute;
      bottom: -80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #4a90d9;
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    #scroll-hint svg { animation: bounce 1.5s ease-in-out infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(6px); }
    }

    /* Mid panel */
    #mid-panel {
      top: 50%;
      left: 3rem;
      transform: translateY(calc(-50% + 20px));
      max-width: 300px;
      background: rgba(10, 10, 18, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 3px solid #4a90d9;
      padding: 1.5rem 1.75rem;
      border-radius: 0 10px 10px 0;
    }
    #mid-panel.visible { transform: translateY(-50%); }
    #mid-panel h2 { font-size: 1.3rem; margin-bottom: 0.6rem; }
    #mid-panel p  { color: #a0a8c0; line-height: 1.65; font-size: 0.95rem; }

    /* Footer */
    #footer-credits {
      bottom: 2.5rem;
      right: 1.5rem;
      text-align: right;
      font-size: 0.78rem;
      color: #505870;
      line-height: 1.7;
    }
    #footer-credits a { color: #4a90d9; text-decoration: none; }

    /* Progress bar */
    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, #4a90d9, #a855f7);
      z-index: 100;
    }

    /* Pitch indicator */
    #hud {
      position: fixed;
      top: 1.5rem; right: 1.5rem;
      z-index: 20;
      background: rgba(10, 10, 18, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 16px;
      text-align: right;
    }
    #hud .hud-label { font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; color: #506080; }
    #hud .hud-value { font-size: 1.5rem; font-weight: 700; color: #4a90d9; font-variant-numeric: tabular-nums; line-height: 1.2; }
    #hud .hud-mode  { font-size: 0.7rem; color: #7090b0; margin-top: 2px; }
  </style>
</head>
<body>

  <div id="map"></div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Loading map…</p>
  </div>

  <div id="scroll-driver"></div>

  <div id="overlays">
    <div id="progress-bar"></div>

    <div id="hero" class="panel visible">
      <h1>Scroll Into<br><span>3D</span></h1>
      <p>Watch Manhattan tilt into perspective</p>
      <div id="scroll-hint">
        <span>Scroll down</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
    </div>

    <div id="mid-panel" class="panel">
      <h2>The city reveals itself</h2>
      <p>Keep scrolling to tilt into a full three-dimensional perspective. Buildings emerge from the grid.</p>
    </div>

    <div id="footer-credits" class="panel">
      <p>Built with <a href="https://maplibre.org" target="_blank">MapLibre GL JS</a></p>
      <p>Tiles © <a href="https://openfreemap.org" target="_blank">OpenFreeMap</a> / OpenStreetMap contributors</p>
    </div>
  </div>

  <div id="hud">
    <div class="hud-label">Pitch</div>
    <div class="hud-value" id="hud-pitch">0°</div>
    <div class="hud-mode" id="hud-mode">2D view</div>
  </div>

  <script>
    // ── Camera config ─────────────────────────────────────────────
    const CENTER = [-74.006, 40.7128]; // Manhattan, NYC

    const CAM = {
      zoomStart: 14.5, zoomEnd: 15.5,
      pitchStart: 0,   pitchEnd: 60,
      bearingStart: 0, bearingEnd: -20,
    };

    // Sub-ranges of scroll progress [0-1] for each parameter
    const RANGE = {
      pitch:   [0.05, 0.85],
      bearing: [0.10, 0.90],
      zoom:    [0.20, 0.80],
    };

    // ── Easing ────────────────────────────────────────────────────
    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
      const t = Math.max(0, Math.min(1, (value - inMin) / (inMax - inMin)));
      return outMin + easeInOutCubic(t) * (outMax - outMin);
    }

    // ── Map init ──────────────────────────────────────────────────
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/liberty',
      center: CENTER,
      zoom: CAM.zoomStart,
      pitch: CAM.pitchStart,
      bearing: CAM.bearingStart,
      antialias: true,
      scrollZoom: false,
      dragRotate: false,
      dragPan: false,
      keyboard: false,
      doubleClickZoom: false,
      touchZoomRotate: false,
      attributionControl: { compact: true },
    });

    // Fallback style if primary fails
    map.on('error', () => {
      try { map.setStyle('https://demotiles.maplibre.org/style.json'); } catch (_) {}
    });

    // Hide loading overlay once map is ready
    map.on('load', () => {
      document.getElementById('loading').classList.add('hidden');
    });

    // ── Scroll logic ──────────────────────────────────────────────
    const hero    = document.getElementById('hero');
    const midPanel = document.getElementById('mid-panel');
    const footer   = document.getElementById('footer-credits');
    const progressBar = document.getElementById('progress-bar');
    const hudPitch = document.getElementById('hud-pitch');
    const hudMode  = document.getElementById('hud-mode');

    let ticking = false;
    let lastProgress = -1;

    function getProgress() {
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      return maxScroll > 0 ? Math.max(0, Math.min(1, window.scrollY / maxScroll)) : 0;
    }

    function updateMap(p) {
      // jumpTo is instantaneous — no queued animations fighting scroll input
      map.jumpTo({
        pitch:   mapRange(p, ...RANGE.pitch,   CAM.pitchStart,   CAM.pitchEnd),
        bearing: mapRange(p, ...RANGE.bearing, CAM.bearingStart, CAM.bearingEnd),
        zoom:    mapRange(p, ...RANGE.zoom,    CAM.zoomStart,    CAM.zoomEnd),
      });
    }

    function updateUI(p) {
      const pitch = mapRange(p, ...RANGE.pitch, CAM.pitchStart, CAM.pitchEnd);

      progressBar.style.width = (p * 100) + '%';
      hudPitch.textContent = Math.round(pitch) + '°';
      hudMode.textContent = pitch > 5 ? '3D view' : '2D view';

      hero.classList.toggle('visible',    p < 0.25);
      midPanel.classList.toggle('visible', p >= 0.35 && p <= 0.65);
      footer.classList.toggle('visible',   p > 0.80);
    }

    window.addEventListener('scroll', () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        const p = getProgress();
        if (Math.abs(p - lastProgress) > 0.0005) {
          updateMap(p);
          updateUI(p);
          lastProgress = p;
        }
        ticking = false;
      });
    }, { passive: true });

    // Set initial state
    updateUI(0);
  </script>
</body>
</html>
